<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Booking Engine 🚀</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container" class="glass-layer">
        <header class="header-bar">
            <button class="icon-button menu-icon" aria-label="Menu"></button>
            <h1 class="app-title">Interstellar Reservations</h1>
            <button class="icon-button profile-icon" aria-label="Profile"></button>
        </header>

        <main class="main-content">
            <section class="booking-module">
                <div class="glass-panel search-panel">
                    <h2 class="panel-title">Initiate Protocol Sigma</h2>
                    <div class="input-group">
                        <label for="destination">Destination Coordinates:</label>
                        <input type="text" id="destination" placeholder="e.g., Andromeda Galaxy">
                    </div>
                    <div class="input-group">
                        <label for="check-in">Arrival Trajectory:</label>
                        <input type="date" id="check-in">
                    </div>
                    <div class="input-group">
                        <label for="check-out">Departure Vector:</label>
                        <input type="date" id="check-out">
                    </div>
                    <div class="input-group">
                        <label for="guests">Temporal Travelers:</label>
                        <input type="number" id="guests" value="1" min="1">
                    </div>
                    <button id="search-button" class="action-button">Engage Hyperdrive Search ⚡</button>
                </div>
            </section>

            <section class="results-display">
                <div class="glass-panel results-panel hidden" id="results-panel">
                    <h2 class="panel-title">Synchronizing Data Streams...</h2>
                    <ul id="booking-results" class="result-list">
                        </ul>
                    <div class="status-message" id="status-message"></div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav glass-layer">
            <a href="#" class="nav-item active">Home</a>
            <a href="#" class="nav-item">Bookings</a>
            <a href="#" class="nav-item">Settings</a>
            <a href="#" class="nav-item">Help</a>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
