<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Selection Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="load-card">
            <div class="load-details">
                <h2>Milwaukee to Chicago</h2>
                <p class="price">$800</p>
                <p class="rate">Rate per Mile: $8.89</p>
            </div>
            <button class="book-button">Book</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
